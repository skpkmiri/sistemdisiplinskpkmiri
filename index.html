<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekod Disiplin SKPK Miri</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #e5e5e5; }
        .cyber-font { font-family: 'Orbitron', sans-serif; }
        .cyber-card { background: rgba(20, 20, 20, 0.9); border: 1px solid #333; }
        .neon-border { border: 1px solid #0ff; box-shadow: 0 0 10px rgba(0,255,255,0.2); }
        .neon-text { color: #0ff; text-shadow: 0 0 5px rgba(0,255,255,0.5); }
    </style>
</head>
<body class="min-h-screen">

    <div id="app" class="p-4 md:p-8">
        <!-- Logo & Header -->
        <header class="flex items-center gap-4 mb-10 border-b border-gray-800 pb-6">
            <img src="logo.png" alt="Logo" class="w-16 h-16 rounded-full border-2 border-[#0ff]" onerror="this.src='https://placehold.co/100x100/000/0ff?text=SKPK'">
            <div>
                <h1 class="text-3xl font-bold text-white cyber-font neon-text">Rekod Disiplin SKPK Miri</h1>
                <p class="text-sm text-gray-400">Sistem Pengurusan Amalan & Disiplin Digital</p>
            </div>
        </header>

        <!-- Dashboard Navigation -->
        <div id="dashboardView" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div onclick="showAmalanBaik()" class="cyber-card p-6 rounded-lg cursor-pointer hover:border-[#0ff] transition-all">
                <i class="ph ph-thumbs-up text-4xl text-[#39ff14] mb-4"></i>
                <h2 class="text-xl font-bold mb-2">Rekod Amalan Baik</h2>
                <p class="text-gray-400 text-sm">Daftar kelakuan positif murid.</p>
            </div>
        </div>

        <!-- Amalan Baik View -->
        <div id="amalanBaikView" class="hidden">
            <button onclick="hideAmalanBaik()" class="mb-6 flex items-center gap-2 text-gray-400 hover:text-white">
                <i class="ph ph-arrow-left"></i> Kembali ke Menu
            </button>
            <div class="cyber-card p-8 rounded-lg">
                <h2 class="text-2xl font-bold mb-6 cyber-font text-[#39ff14]">Borang Rekod Amalan Baik</h2>
                <!-- Form fields omitted for brevity, logic remains -->
                <button onclick="saveDummyRekod()" class="bg-[#39ff14] text-black font-bold py-3 px-6 rounded">Simpan Rekod (Test)</button>
            </div>
            
            <!-- List Section -->
            <div class="mt-8 overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead><tr class="text-[#39ff14] border-b border-[#39ff14]">
                        <th class="p-3">Nama</th><th class="p-3">Tindakan</th>
                    </tr></thead>
                    <tbody id="rekodTableBody">
                        <!-- Data rows injected by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- E-Sign Modal -->
    <div id="signModal" class="fixed inset-0 z-[80] hidden items-center justify-center bg-black/90 p-4">
        <div class="bg-white p-6 rounded-lg w-full max-w-sm flex flex-col items-center">
            <h3 class="font-bold mb-4 text-black" id="signModalTitle">Tandatangan</h3>
            <canvas id="signCanvas" class="border border-gray-400 w-full h-[150px] mb-4 bg-gray-50"></canvas>
            <div class="flex gap-2 w-full">
                <button onclick="clearSignCanvas()" class="flex-1 bg-gray-500 text-white py-2 rounded">Padam</button>
                <button onclick="saveSignature()" class="flex-1 bg-green-600 text-white py-2 rounded">Simpan</button>
            </div>
            <button onclick="closeSignModal()" class="mt-4 text-gray-500 underline">Tutup</button>
        </div>
    </div>

    <!-- PDF Modal -->
    <div id="pdfModal" class="fixed inset-0 z-[60] hidden items-center justify-center bg-black/90 p-4 overflow-y-auto">
        <div class="bg-white text-black p-8 max-w-2xl w-full rounded shadow-xl" id="pdfContent">
            <!-- PDF Content -->
        </div>
    </div>

    <script>
        let signaturesDb = {}; 
        let currentSignRole = '';
        let currentSignRowId = '';
        const canvas = document.getElementById('signCanvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;

        function showAmalanBaik() { document.getElementById('dashboardView').classList.add('hidden'); document.getElementById('amalanBaikView').classList.remove('hidden'); }
        function hideAmalanBaik() { document.getElementById('dashboardView').classList.remove('hidden'); document.getElementById('amalanBaikView').classList.add('hidden'); }

        canvas.addEventListener('mousedown', () => drawing = true);
        canvas.addEventListener('mouseup', () => { drawing = false; ctx.beginPath(); });
        canvas.addEventListener('mousemove', (e) => {
            if (!drawing) return;
            ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.strokeStyle = '#000';
            ctx.lineTo(e.offsetX, e.offsetY); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(e.offsetX, e.offsetY);
        });

        function clearSignCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }
        function openSignModal(role, rowId) {
            currentSignRole = role; currentSignRowId = rowId;
            document.getElementById('signModal').classList.remove('hidden');
            document.getElementById('signModal').classList.add('flex');
            clearSignCanvas();
        }
        function closeSignModal() { document.getElementById('signModal').classList.add('hidden'); }
        
        function saveSignature() {
            const dataUrl = canvas.toDataURL();
            if (!signaturesDb[currentSignRowId]) signaturesDb[currentSignRowId] = {};
            signaturesDb[currentSignRowId][currentSignRole] = dataUrl;
            closeSignModal();
            viewPDF(currentSignRowId); 
        }

        function viewPDF(rowId) {
            document.getElementById('pdfModal').classList.remove('hidden');
            document.getElementById('pdfContent').innerHTML = `
                <h2 class="text-xl font-bold mb-4">Laporan Amalan Baik</h2>
                <div class="grid grid-cols-2 gap-10 mt-20 text-center text-sm">
                    <div>
                        <p class="mb-4">Disemak Oleh,</p>
                        ${signaturesDb[rowId]?.pkHem ? `<img src="${signaturesDb[rowId].pkHem}" class="h-20 mx-auto mb-2 border-b border-black">` : `<button onclick="openSignModal('pkHem', '${rowId}')" class="mb-20 text-blue-600 underline">Klik untuk Tanda</button>`}
                        <p class="font-bold border-t border-black pt-2">LING MEE CHOO</p>
                        <p>PK HEM</p>
                    </div>
                    <div>
                        <p class="mb-4">Disahkan Oleh,</p>
                        ${signaturesDb[rowId]?.gb ? `<img src="${signaturesDb[rowId].gb}" class="h-20 mx-auto mb-2 border-b border-black">` : `<button onclick="openSignModal('gb', '${rowId}')" class="mb-20 text-blue-600 underline">Klik untuk Tanda</button>`}
                        <p class="font-bold border-t border-black pt-2">AZIZ BIN TAHIR</p>
                        <p>Guru Besar</p>
                    </div>
                </div>
                <button onclick="document.getElementById('pdfModal').classList.add('hidden')" class="mt-8 bg-gray-800 text-white px-4 py-2 rounded">Tutup</button>
            `;
        }

        function saveDummyRekod() {
            const rowId = 'row-' + Date.now();
            document.getElementById('rekodTableBody').innerHTML += `
                <tr id="${rowId}" class="border-b border-gray-800">
                    <td class="p-3">Ali bin Abu</td>
                    <td class="p-3"><button onclick="viewPDF('${rowId}')" class="text-blue-400 underline">Lihat PDF</button></td>
                </tr>
            `;
        }
    </script>
</body>
</html>
